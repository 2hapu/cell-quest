const COLS = 11, ROWS = 32;
const colName = i => String.fromCharCode(65+i);
const sheetEl = document.getElementById('sheet');
let cells = [];

(function buildGrid(){
  let html = '<tr><th class="corner"></th>';
  for(let c=0;c<COLS;c++) html += `<th class="colhead">${colName(c)}</th>`;
  html += '</tr>';
  for(let r=1;r<=ROWS;r++){
    html += `<tr><th class="rowhead">${r}</th>`;
    for(let c=0;c<COLS;c++) html += `<td data-r="${r}" data-c="${c}"></td>`;
    html += '</tr>';
  }
  sheetEl.innerHTML = html;
  cells = Array.from({length:ROWS+1},()=>[]);
  sheetEl.querySelectorAll('td').forEach(td=>{
    cells[+td.dataset.r][+td.dataset.c] = td;
    td.addEventListener('click', ()=>{
      document.querySelectorAll('td.selected').forEach(x=>x.classList.remove('selected'));
      td.classList.add('selected');
      document.getElementById('namebox').textContent = colName(+td.dataset.c)+td.dataset.r;
      document.getElementById('fxcontent').textContent = td.textContent;
    });
  });
})();

function clearGrid(){
  sheetEl.querySelectorAll('td').forEach(td=>{ td.textContent=''; td.className=''; td.onclick=null; });
}
function setCell(r,c,text,cls,onclick){
  if(r>ROWS||c>=COLS||r<1) return;
  const td = cells[r][c];
  td.textContent = text;
  if(cls) td.className = cls;
  if(onclick){ td.classList.add('choice'); td.onclick = e=>{ e.stopPropagation(); onclick(); }; }
}
function setStatus(t){ document.getElementById('statustext').textContent = t; }
function setFx(t){ document.getElementById('fxcontent').textContent = t; }

  if(att==='야근' && def!=='야근') return 1.3;
  if(def==='야근' && att!=='야근') return 1.3;
  if(TRIANGLE[att]===def) return 1.5;
  if(TRIANGLE[def]===att) return 0.67;

}

function statsFor(sid, lv, gold){
  const s = SPECIES[sid];
  const mult = gold ? 1.15 : 1;
  return {
    maxhp: Math.round((s.hp + (lv-1)*6) * mult),
    atk: Math.round(s.atk * (1+0.08*(lv-1)) * mult),
  };
}
function makeMon(sid, lv, gold){
  const st = statsFor(sid, lv, gold);
  return { sid, lv, gold:!!gold, maxhp:st.maxhp, hp:st.maxhp, atk:st.atk, exp:0 };
}
function monName(m){ return (m.gold?'황금 ':'') + SPECIES[m.sid].name; }
function monType(m){ return SPECIES[m.sid].type; }
function knownMoves(m){
  return SPECIES[m.sid].moves.filter(mv=>mv[0]<=m.lv).slice(-4);
}
function expNeed(lv){ return lv*22; }

const hasCloud = (typeof window!=='undefined') && !!window.storage;
let cloudSaveData = null, lastCloudSave = 0, lastBoardSave = 0;

async function cloudSave(force){
  if(!hasCloud || !G.name) return;
  const now = Date.now();
  if(!force && now-lastCloudSave<4000) return;
  lastCloudSave = now;
  try{ await window.storage.set('savegame', JSON.stringify(G)); }catch(e){}
}
async function cloudLoadCheck(){
  if(!hasCloud) return;
  try{
    const r = await window.storage.get('savegame');
    if(r && r.value){
      const obj = JSON.parse(r.value);
      if(obj && obj.v===2 && Array.isArray(obj.party)) cloudSaveData = obj;
    }
  }catch(e){ /* 저장 데이터 없음 */ }
  if(G.screen==='title' && !bossMode) render();
}
async function updateBoard(force){
  if(!hasCloud || !G.name || G.party.length===0) return;
  const now = Date.now();
  if(!force && now-lastBoardSave<8000) return;
  lastBoardSave = now;
  try{
    await window.storage.set('lb:'+G.name, JSON.stringify({
      name:G.name, wins:G.wins, dex:dexCaughtCount(),
      gold:Object.keys(G.goldDex).length, story:G.story, ts:Date.now()
    }), true);
  }catch(e){}
}

let rankCache = null;
async function loadRank(){
  if(!hasCloud){ rankCache=[]; if(G.screen==='rank') paintRank(); return; }
  try{
    const res = await window.storage.list('lb:', true);
    const rows = [];
    for(const k of (res && res.keys ? res.keys : []).slice(0,20)){
      try{
        const r = await window.storage.get(k, true);
        if(r && r.value) rows.push(JSON.parse(r.value));
      }catch(e){}
    }
    rows.sort((a,b)=>(b.story-a.story)||(b.dex-a.dex)||(b.wins-a.wins));
    rankCache = rows;
  }catch(e){ rankCache = []; }
  if(G.screen==='rank' && !bossMode) paintRank();
}

function paint(lines, choices, fx){
  clearGrid();

  for(const ln of lines){
    if(r>ROWS-2) break;
    if(typeof ln === 'string') setCell(r,1,ln);
    else setCell(r,1,ln[0],ln[1]);
    r++;
  }
  r++;
  choices.forEach((ch,i)=>{
    if(r>ROWS) return;
    setCell(r,1,`${i+1}. ${ch[0]}`,'choice',ch[1]);
    r++;
  });
  if(G.screen!=='title') paintPartyPanel();
  setFx(fx || '');
}

  document.getElementById('dlgdesc').textContent = '랭킹 보드에 표시될 이름을 입력하세요. (12자 이내, 모두에게 공개됩니다)';
  dlgText.value=''; dlgText.onfocus=null;
  dlgOk.textContent = '입력 후 시작';
  dlgOk.onclick = ()=>{
    let n = dlgText.value.trim().replace(/[\s'"\/\\]/g,'').slice(0,12);
    if(!n) n = '사원'+Math.floor(Math.random()*900+100);
    const had = cloudSaveData;
    newGame();
    G.name = n;
    cloudSaveData = had; /* 타이틀로 돌아오면 여전히 이어하기 가능 */
    closeDlg();
    G.screen='starter';
    render();
  };
  dlg.classList.add('show');
  dlgText.focus();
}

/* ── 허브 ── */
function scrHub(){
  setStatus('준비');
  cloudSave(); updateBoard();
  if(G.floor > G.story && G.floor < 5) G.floor = Math.min(G.floor, G.story);
  const fl = FLOORS[G.floor];
  const ch = STORY[Math.min(G.story, STORY.length-1)];
  const lines = [
    [`― ${fl.name} · 내 자리 ―`,'bold'],
    [ch[0],'dim'],
    '',
  ];
  pendingMsg.forEach(m=>lines.push([m,'hl']));
  pendingMsg = [];
  const choices = fl.areas.map(a=>[
    `${a.name} 탐색 (LV ${a.lv[0]}~${a.lv[1]})`, ()=>startExplore(a)
  ]);
  const bossIdx = fl.boss;
  const bossBeaten = G.story > bossIdx;
  if(!bossBeaten && bossIdx<=G.story){
    choices.push([`★ 보스에게 도전: ${BOSSES[bossIdx].name}`, ()=>startBossBattle(bossIdx)]);
  }
  if(G.story>=6 && G.floor===5){
    choices.push(['★ 회장봉황과 재대결 (포획 불가)', ()=>startBossBattle(5)]);
  }
  choices.push(
    ['다른 층으로 이동', ()=>{ G.screen='moveFloor'; render(); }],
    ['정수기에서 회복 (무료, 전원 완전 회복)', ()=>{
      G.party.forEach(m=>m.hp=m.maxhp);
      pendingMsg.push('시원한 물과 함께 파티가 모두 회복되었다!');
      render();
    }],
    ['매점 (복지포인트 사용)', ()=>{ G.screen='shop'; render(); }],
    ['가방', ()=>{ G.screen='bag'; render(); }],
    ['파티 관리', ()=>{ G.screen='party'; render(); }],
    ['몬스터 도감', ()=>{ G.screen='dex'; render(); }],
  );
  if(hasCloud) choices.push(['사내 랭킹 보드', ()=>{ G.screen='rank'; render(); }]);
  choices.push(['백업 코드 (저장/불러오기)', openSaveDlg]);
  paint(lines, choices, `=NOW() · ${fl.name}`);
}

function scrMoveFloor(){
  const unlocked = Math.min(G.story, 4);
  const lines = [['― 엘리베이터 ―','bold'],'', '어느 층으로 갈까?',''];
  const choices = [];
  FLOORS.forEach((f,i)=>{
    if(i<=unlocked) choices.push([f.name + (i===G.floor?' (현재)':''), ()=>{ G.floor=i; G.screen='hub'; render(); }]);
    else if(i<5) choices.push([f.name+' — 잠김 (보스를 꺾어야 함)', ()=>{}]);
  });
  if(G.story>=5) choices.push(['?? 야근차원 — 사무실 구석의 균열', ()=>{ G.floor=5; G.screen='hub'; render(); }]);
  choices.push(['돌아간다', ()=>{ G.screen='hub'; render(); }]);
  paint(lines, choices);
}

  if(boxMode==='deposit'){
    lines.push('누구를 보관함에 넣을까? (선두 제외)');
    const choices = [];
    G.party.forEach((m,i)=>{
      if(i!==G.active) choices.push([`${monName(m)} LV${m.lv} 보관`, ()=>{
        G.box.push(m);
        G.party.splice(i,1);
        if(G.active>i) G.active--;
        boxMode='view'; render();
      }]);
    });
    choices.push(['취소', ()=>{ G.screen='party'; render(); }]);
    paint(lines, choices);
    return;
  }
  if(G.box.length===0) lines.push('보관함이 비어 있다.');
  else G.box.forEach(m=>lines.push([`· ${monName(m)} LV${m.lv} [${monType(m)}] HP ${m.hp}/${m.maxhp}`, m.gold?'gold':'']));
  const choices = [];
  G.box.forEach((m,i)=>{
    if(G.party.length<4) choices.push([`${monName(m)}을(를) 파티로`, ()=>{
      G.party.push(m); G.box.splice(i,1); render();

  choices.push(['돌아간다', ()=>{ G.screen='party'; render(); }]);
  paint(lines, choices);
}

  });

  setFx(`=COUNTIF(도감, "포획") → ${dexCaughtCount()}`);
}

/* ── 탐색 ── */
let curArea = null, exploreText = [];
function startExplore(area){
  curArea = area;
  const roll = Math.random();
  if(roll < 0.74){
    let pool = area.pool.slice();
    /* 야근차원: 전설 출현 */
    if(G.floor===5){
      if(G.story>=5 && Math.random()<0.05) pool=['dragon'];
      if(G.story>=6 && Math.random()<0.03) pool=['phoenix'];
    }
    const sid = pool[Math.floor(Math.random()*pool.length)];
    const lv = SPECIES[sid].legend
      ? (sid==='dragon'?18:24)
      : area.lv[0] + Math.floor(Math.random()*(area.lv[1]-area.lv[0]+1));
    const gold = !SPECIES[sid].legend && Math.random()<0.06;
    startWildBattle(makeMon(sid, lv, gold));
  } else if(roll < 0.90){
    const pickPool = G.story>=3 ? ['clip','clip','bacchus','goldclip'] : ['clip','clip','bacchus'];
    const found = pickPool[Math.floor(Math.random()*pickPool.length)];
    G.items[found]++;
    G.screen='explore';
    exploreText = [area.flavor,'',`바닥에서 ${ITEM_DEF[found].name} 1개를 주웠다!`];
    render();
  } else {
    G.screen='explore';
    exploreText = [area.flavor,'','…아무 일도 일어나지 않았다. 평화로운 직장이다.'];
    render();
  }
}
function scrExplore(){
  paint([[`― ${curArea.name} ―`,'bold'],'',...exploreText,''],[
    ['더 둘러본다', ()=>startExplore(curArea)],
    ['자리로 돌아간다', ()=>{ G.screen='hub'; render(); }],
  ]);
}

/* ════════════════ 전투 ════════════════ */
function pushLog(s){ G.log.push(s); if(G.log.length>9) G.log.shift(); }

function ensureAliveLead(){
  if(activeMon().hp<=0){
    const idx = G.party.findIndex(m=>m.hp>0);
    if(idx>=0) G.active = idx;
  }
}

function startWildBattle(enemy){
  ensureAliveLead();
  dexSee(enemy.sid);
  G.battle = { enemy, wild:true, over:false, menu:'main' };
  G.log = [`야생의 ${monName(enemy)}(LV${enemy.lv})이(가) 나타났다!`];
  if(enemy.gold) G.log.push('황금빛으로 빛나고 있다…! (희귀 개체)');
  if(SPECIES[enemy.sid].legend) G.log.push('압도적인 야근의 기운이 느껴진다…!');
  G.screen='battle'; render();
}

function startBossBattle(idx){
  ensureAliveLead();
  if(aliveMons().length===0){ pendingMsg.push('싸울 수 있는 몬스터가 없다. 먼저 회복하자.'); render(); return; }
  const B = BOSSES[idx];
  const party = B.party.map(([sid,lv])=>makeMon(sid,lv));
  party.forEach(m=>dexSee(m.sid));
  G.battle = { enemyParty:party, eIdx:0, enemy:party[0], wild:false, bossIdx:idx, over:false, menu:'main' };
  G.log = [B.pre, `${B.name}이(가) ${monName(party[0])}을(를) 내보냈다!`];
  G.screen='battle'; render();
}

function dmgCalc(attacker, power, moveType, defender){
  const mult = moveType ? typeMult(moveType, monType(defender)) : 1;
  const crit = Math.random()<0.08 ? 1.5 : 1;
  const base = attacker.atk * power/40 * mult * crit * (0.85+Math.random()*0.3);
  return { val: Math.max(1, Math.round(base)), mult, crit: crit>1 };
}
function fxTag(mult, crit){
  let s='';
  if(crit) s+=' 급소!';
  if(mult>1) s+=' (효과 굉장!)'; else if(mult<1) s+=' (효과 별로…)';
  return s;
}

function enemyTurn(){
  const b=G.battle; if(b.over) return;
  const e=b.enemy, me=activeMon();
  if(e.hp<=0) return;
  const mvs = knownMoves(e);
  const mv = mvs[Math.floor(Math.random()*mvs.length)];
  const {val,mult,crit} = dmgCalc(e, mv[2], mv[3], me);
  me.hp = Math.max(0, me.hp - val);
  pushLog(`${monName(e)}의 ${mv[1]}! ${val} 데미지${fxTag(mult,crit)}`);
  if(me.hp<=0){
    pushLog(`${monName(me)}이(가) 기절했다!`);
    if(aliveMons().length===0){
      b.over=true;
      pushLog('더 싸울 몬스터가 없다… 눈앞이 깜깜해졌다.');
      setTimeout(()=>{ G.screen='gameover'; render(); },40);
    } else {
      b.menu='forceSwitch';
    }
  }
}

function grantExpAndMoney(e, moneyMult){
  const me = activeMon();
  const exp = e.lv*13;
  const pay = Math.round(e.lv*15*(e.gold?3:1)*(moneyMult||1));
  G.money += pay;
  me.exp += exp;
  pushLog(`경험치 ${exp}, 복지포인트 ${pay}P 획득!`);
  while(me.exp >= expNeed(me.lv)){
    me.exp -= expNeed(me.lv);
    me.lv++;
    const before = knownMoves(me).map(m=>m[1]);
    const st = statsFor(me.sid, me.lv, me.gold);
    const gain = st.maxhp - me.maxhp;
    me.maxhp = st.maxhp; me.atk = st.atk;
    me.hp = Math.min(me.maxhp, me.hp+gain);
    pushLog(`${monName(me)} 레벨 업! → LV${me.lv}`);
    const evo = SPECIES[me.sid].evo;
    if(evo && me.lv>=evo.lv){
      const oldName = monName(me);
      me.sid = evo.to;
      const st2 = statsFor(me.sid, me.lv, me.gold);
      const ratio = me.hp/me.maxhp;
      me.maxhp = st2.maxhp; me.atk = st2.atk;
      me.hp = Math.max(1, Math.round(me.maxhp*ratio));
      pushLog(`!! ${oldName}이(가) ${monName(me)}(으)로 진화했다 !!`);
      dexCatch(me.sid, me.gold);
    }
    const after = knownMoves(me).map(m=>m[1]);
    after.filter(n=>!before.includes(n)).forEach(n=>pushLog(`새 기술 [${n}]을(를) 배웠다!`));
  }
}

function winWild(){
  const b=G.battle; b.over=true; G.wins++;
  pushLog(`${monName(b.enemy)}을(를) 쓰러뜨렸다!`);
  grantExpAndMoney(b.enemy, 1);
  if(Math.random()<0.4){
    const drop = Math.random()<0.6?'clip':'bacchus';
    G.items[drop]++;
    pushLog(`${ITEM_DEF[drop].name} 1개를 주웠다!`);
  }
}

function onTrainerMonDown(){
  const b=G.battle, B=BOSSES[b.bossIdx];
  pushLog(`${monName(b.enemy)}을(를) 쓰러뜨렸다!`);
  grantExpAndMoney(b.enemy, 1.3);
  b.eIdx++;
  if(b.eIdx < b.enemyParty.length){
    b.enemy = b.enemyParty[b.eIdx];
    pushLog(`${B.name}이(가) ${monName(b.enemy)}을(를) 내보냈다!`);
  } else {
    b.over=true; G.wins++;
    G.money += B.reward;
    pushLog(`★ ${B.name}에게 승리! 보상 ${B.reward}P!`);
    if(b.bossIdx===G.story){
      G.story++;
      if(G.story===5){ setTimeout(()=>{ G.screen='ending'; render(); },40); return; }
      if(G.story===6){ setTimeout(()=>{ G.screen='ending'; render(); },40); return; }
      b.afterStory = true;
    }
  }
}

function playerMove(mvIdx){
  const b=G.battle; if(b.over) return;
  const me=activeMon(), e=b.enemy;
  const mv = knownMoves(me)[mvIdx];
  const {val,mult,crit} = dmgCalc(me, mv[2], mv[3], e);
  e.hp = Math.max(0, e.hp - val);
  pushLog(`${monName(me)}의 ${mv[1]}! ${val} 데미지${fxTag(mult,crit)}`);
  if(e.hp<=0){
    if(b.wild) winWild(); else onTrainerMonDown();
  } else enemyTurn();
  b.menu='main';
  render();
}

function throwClip(gold){
  const b=G.battle; if(b.over||!b.wild) return;
  const key = gold?'goldclip':'clip';
  if(G.items[key]<=0){ pushLog(`${ITEM_DEF[key].name}이(가) 없다!`); render(); return; }
  G.items[key]--;
  const e=b.enemy;
  let chance = (0.22 + 0.65*(1 - e.hp/e.maxhp)) * (gold?1.6:1);
  if(e.gold) chance *= 0.75;
  if(SPECIES[e.sid].legend) chance *= 0.45;
  if(Math.random()<chance){
    pushLog(`클립이 ${monName(e)}을(를) 집었다! 포획 성공!!`);
    e.hp = Math.max(1, e.hp);
    if(G.party.length<4){ G.party.push(e); pushLog('파티에 합류했다.'); }
    else { G.box.push(e); pushLog('파티가 가득 차서 보관함으로 이동했다.'); }
    dexCatch(e.sid, e.gold);
    b.over=true;
  } else {
    pushLog(`아깝다! ${monName(e)}이(가) 클립을 튕겨냈다!`);
    enemyTurn();
  }
  b.menu='main';
  render();
}

function useHeal(kind){
  const b=G.battle; if(b.over) return;
  const me=activeMon();
  if(G.items[kind]<=0){ pushLog('아이템이 없다!'); render(); return; }
  if(me.hp>=me.maxhp){ pushLog('HP가 이미 가득하다!'); render(); return; }
  G.items[kind]--;
  if(kind==='bacchus'){ me.hp=Math.min(me.maxhp, me.hp+35); pushLog(`${monName(me)} HP 35 회복!`); }
  else { me.hp=me.maxhp; pushLog(`${monName(me)} HP 완전 회복!`); }
  enemyTurn(); b.menu='main'; render();
}

function tryRun(){
  const b=G.battle; if(b.over) return;
  if(!b.wild){ pushLog('보스 앞에서 도망칠 수는 없다…!'); render(); return; }
  if(Math.random()<0.7){ pushLog('무사히 도망쳤다!'); b.over=true; }
  else { pushLog('도망칠 수 없었다!'); enemyTurn(); }
  b.menu='main'; render();
}

function switchMon(i, free){
  const b=G.battle;
  if(G.party[i].hp<=0 || i===G.active) return;
  G.active=i;
  pushLog(`가라, ${monName(G.party[i])}!`);
  if(!free && !b.over) enemyTurn();
  b.menu='main'; render();
}

function scrBattle(){
  setStatus('계산 중...');
  const b=G.battle, e=b.enemy, me=activeMon();
  const bossLabel = b.wild ? '' : ` 〔${BOSSES[b.bossIdx].name} ${b.eIdx+1}/${b.enemyParty.length}〕`;
  const lines = [
    [`⚔ ${monName(e)}  LV${e.lv}  [${monType(e)}]${bossLabel}`, e.gold?'gold':'bold'],
    [`   HP ${e.hp}/${e.maxhp}  ${'█'.repeat(Math.ceil(e.hp/e.maxhp*10)).padEnd(10,'░')}`, e.hp<e.maxhp*0.3?'hl':''],
    '',
    ...G.log,
    '',
  ];
  let choices = [];
  if(b.over){
    const next = b.afterStory
      ? ()=>{ pendingMsg.push(BOSSES[b.bossIdx].win); G.screen='storyBeat'; storyBeatNext='hub'; render(); }
      : ()=>{ G.screen='hub'; render(); };
    if(aliveMons().length>0) choices=[['전투 종료 — 돌아간다', next]];
  } else if(b.menu==='forceSwitch'){
    G.party.forEach((m,i)=>{ if(m.hp>0) choices.push([`${monName(m)} 교체 투입 (HP ${m.hp})`, ()=>switchMon(i,true)]); });
  } else if(b.menu==='moves'){
    knownMoves(me).forEach((mv,i)=>{
      choices.push([`${mv[1]} (위력 ${mv[2]}${mv[3]?', '+mv[3]:''})`, ()=>playerMove(i)]);
    });
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else if(b.menu==='bag'){
    if(b.wild){
      choices.push([`집게클립 던지기 (${G.items.clip})`, ()=>throwClip(false)]);
      if(G.items.goldclip>0) choices.push([`골드클립 던지기 (${G.items.goldclip})`, ()=>throwClip(true)]);
    }
    choices.push([`박카스 — HP 35 (${G.items.bacchus})`, ()=>useHeal('bacchus')]);
    if(G.items.hotsix>0) choices.push([`핫식스 — 완전 회복 (${G.items.hotsix})`, ()=>useHeal('hotsix')]);
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else if(b.menu==='switch'){
    G.party.forEach((m,i)=>{
      if(i!==G.active && m.hp>0) choices.push([`${monName(m)} (HP ${m.hp}/${m.maxhp})`, ()=>switchMon(i,false)]);
    });
    choices.push(['← 뒤로', ()=>{ b.menu='main'; render(); }]);
  } else {
    choices = [
      ['공격한다', ()=>{ b.menu='moves'; render(); }],
      ['가방 (포획/회복)', ()=>{ b.menu='bag'; render(); }],
    ];
    if(G.party.filter((m,i)=>i!==G.active&&m.hp>0).length>0)
      choices.push(['교체한다', ()=>{ b.menu='switch'; render(); }]);
    choices.push([b.wild?'도망간다':'도망갈 수 없다…', tryRun]);
  }
  paint(lines, choices, `=BATTLE("${monName(e)}", ${e.hp})`);
}

function scrGameover(){
  G.money = Math.max(0, G.money - Math.floor(G.money*0.1));
  paint([
    ['― 의식이 흐려진다… ―','bold'],'',
    '정신을 차려 보니 탕비실 소파였다.',
    '누군가 이온음료를 머리맡에 두고 갔다. (복지포인트 10% 분실)',
    '파티가 모두 회복되었다. 다시 가 보자.',
  ],[
    ['일어난다', ()=>{ G.party.forEach(m=>m.hp=m.maxhp); G.screen='hub'; render(); }],
  ]);
}

function scrEnding(){
  cloudSave(true); updateBoard(true);
  const final = G.story>=6;
  const lines = final ? [
    ['★★★ 진엔딩 — 전설의 사원 ★★★','bold'],'',
    '회장봉황마저 당신을 인정했다. 회사 역사상 최초의 일이다.',
    '게시판에 공지가 붙었다. "전 직원 주 4일제 시범 도입."','',
    [`최종 기록 — 승수 ${G.wins} / 도감 ${dexCaughtCount()}/${ALL_SIDS.length} / 황금 ${Object.keys(G.goldDex).length}종`,'hl'],'',
    '남은 목표: 도감 완성, 황금 개체 수집, 전설 포획(야근차원에서 드물게 출현)',
  ] : [
    ['★★★ 엔딩 ★★★','bold'],'',
    BOSSES[4].win,
    '사무실에 평화가 찾아왔다. 오피스 몬스터들도 칼퇴를 시작했다.','',
    '…그런데 사무실 구석에 검은 균열이 열렸다.',
    ['새 지역 [야근차원]이 해금되었습니다! (엘리베이터에서 이동)','hl'],
    ['야근차원에서는 부장드래곤이 야생 개체로 드물게 출현해 포획할 수 있다.','hl'],
    '그리고 가장 깊은 곳에는… 회장봉황이 기다린다.',
  ];
  paint(lines,[
    ['계속 모험한다', ()=>{ G.screen='storyBeat'; storyBeatNext='hub'; render(); }],
    ['백업 코드 발급 (저장)', openSaveDlg],
  ],'=GAME.CLEAR()');
}

/* ════════════════ 저장 / 불러오기 (백업 코드) ════════════════ */
const dlg = document.getElementById('dlg');
const dlgText = document.getElementById('dlgtext');
const dlgOk = document.getElementById('dlgok');
function closeDlg(){ dlg.classList.remove('show'); }

function encodeSave(){
  return btoa(unescape(encodeURIComponent(JSON.stringify(G))));
}
function decodeSave(code){
  const obj = JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
  if(!obj || obj.v!==2 || !Array.isArray(obj.party)) throw new Error('bad');
  if(!obj.name) obj.name = '사원'+Math.floor(Math.random()*900+100);
  return obj;
}
function openSaveDlg(){
  document.getElementById('dlgtitle').textContent = '이름 정의 — 백업';
  document.getElementById('dlgdesc').textContent = '아래 코드를 복사해 메모장 등에 보관하세요. [확인]을 누르면 불러오기 모드로 전환됩니다.';
  dlgText.value = encodeSave();
  dlgText.onfocus = ()=>dlgText.select();
  dlgOk.textContent = '불러오기로 전환';
  dlgOk.onclick = openLoadDlg;
  dlg.classList.add('show');
  dlgText.focus();
}
function openLoadDlg(){
  document.getElementById('dlgtitle').textContent = '이름 정의 — 복원';
  document.getElementById('dlgdesc').textContent = '보관해 둔 백업 코드를 붙여넣고 [확인]을 누르세요.';
  dlgText.value = '';
  dlgText.onfocus = null;
  dlgOk.textContent = '확인';
  dlgOk.onclick = ()=>{
    try {
      G = decodeSave(dlgText.value);
      closeDlg();
      pendingMsg.push('백업 코드에서 진행 상황을 복원했다!');
      if(G.screen==='battle'||G.screen==='storyBeat') G.screen='hub';
      render();
    } catch(e){
      document.getElementById('dlgdesc').textContent = '코드를 해석할 수 없습니다. 전체를 정확히 붙여넣었는지 확인하세요.';
    }
  };
  dlg.classList.add('show');
  dlgText.focus();
}

/* ════════════════ 보스 키 (ESC 위장 시트) ════════════════ */
let bossMode = false;
const FAKE_ROWS = (()=>{
  const items=['온라인 광고','오프라인 행사','제휴 마케팅','콘텐츠 제작','SNS 운영','검색 광고','뉴스레터','프로모션','인쇄물','기타 경비'];
  return items.map(n=>{
    const a=Math.round(3200+Math.random()*4800);
    const b2=Math.round(a*(0.82+Math.random()*0.3));
    const c=Math.round(b2*(0.85+Math.random()*0.3));
    return [n,a,b2,c,a+b2+c];
  });
})();
function paintBossSheet(){
  clearGrid();
  setStatus('준비');
  setFx('=SUM(C4:E4)');
  setCell(2,1,'2026년 2분기 채널별 집행 비용 (단위: 천원)','bold');
  ['항목','4월','5월','6월','합계'].forEach((h,i)=>setCell(4,1+i,h,'hdr'));
  FAKE_ROWS.forEach((row,r)=>{
    row.forEach((v,c)=>{
      setCell(5+r,1+c, typeof v==='number'?v.toLocaleString():v, typeof v==='number'?'num':'');
    });
  });
  const tot=[0,0,0,0];
  FAKE_ROWS.forEach(r=>{ for(let i=0;i<4;i++) tot[i]+=r[1+i]; });
  setCell(5+FAKE_ROWS.length,1,'총계','bold');
  tot.forEach((v,i)=>setCell(5+FAKE_ROWS.length,2+i,v.toLocaleString(),'num bold hl'));
}

document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){
    if(dlg.classList.contains('show')){ closeDlg(); return; }
    bossMode=!bossMode; render(); return;
  }
  if(dlg.classList.contains('show')) return;
  if(!bossMode && /^[1-9]$/.test(e.key)){
    const tds=[...sheetEl.querySelectorAll('td.choice')];
    if(tds[+e.key-1]) tds[+e.key-1].click();
  }
});

render();
cloudLoadCheck();
</script>
